# starpivot-mall-member 专属配置
# Nacos Data ID: starpivot-mall-member.yaml  |  Group: DEFAULT_GROUP
# 业务库：star_pivot_member（ums_* 表）

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: ${MALL_DB_DRIVER:com.mysql.cj.jdbc.Driver}
    url: ${MALL_DB_URL:jdbc:mysql://127.0.0.1:3307/star_pivot_member?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MALL_DB_USERNAME:root}
    password: ${MALL_DB_PASSWORD:root}
    druid:
      initial-size: ${MALL_DB_INITIAL_SIZE:5}
      min-idle: ${MALL_DB_MIN_IDLE:5}
      max-active: ${MALL_DB_MAX_ACTIVE:20}
      max-wait: ${MALL_DB_MAX_WAIT:60000}
      validation-query: SELECT 1
      test-while-idle: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/ums/**/*.xml,classpath*:/mapper/pms/**/*.xml,classpath*:/mapper/oms/**/*.xml
  type-aliases-package: cn.org.starpivot.mall.ums.entity,cn.org.starpivot.mall.portal.auth.entity,cn.org.starpivot.mall.pms.entity,cn.org.starpivot.mall.sms.entity,cn.org.starpivot.mall.oms.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.slf4j.Slf4jImpl}

starpivot:
  security:
    authority-strategy: menu-permission
  mall:
    system-db-schema: ${SYSTEM_DB_SCHEMA:star_pivot}
    portal-auth:
      sms:
        mock-enabled: ${MALL_PORTAL_SMS_MOCK:false}
        mock-code: ${MALL_PORTAL_SMS_MOCK_CODE:123456}
        code-ttl-seconds: 300
        send-interval-seconds: 60
        daily-limit-per-mobile: 10
        daily-limit-per-ip: 50
        aliyun:
          enabled: ${MALL_PORTAL_SMS_ALIYUN_ENABLED:true}
          access-key-id: ${MALL_PORTAL_SMS_ALIYUN_ACCESS_KEY_ID:${OSS_ACCESS_KEY_ID:}}
          access-key-secret: ${MALL_PORTAL_SMS_ALIYUN_ACCESS_KEY_SECRET:${OSS_ACCESS_KEY_SECRET:}}
          sign-name: ${MALL_PORTAL_SMS_ALIYUN_SIGN_NAME:速通互联验证码}
          template-code: ${MALL_PORTAL_SMS_ALIYUN_TEMPLATE_CODE:100001}
          scheme-name: ${MALL_PORTAL_SMS_ALIYUN_SCHEME_NAME:}
          verify-mode: ${MALL_PORTAL_SMS_ALIYUN_VERIFY_MODE:redis}
      password:
        max-fail-count: 5
        lock-minutes: 30
      wechat:
        enabled: ${MALL_WECHAT_ENABLED:false}
        mock-enabled: ${MALL_WECHAT_MOCK:true}
        redirect-uri: ${MALL_WECHAT_REDIRECT_URI:http://localhost:3000/portal/login/wechat/callback}
        app-id: ${MALL_WECHAT_APP_ID:}
        app-secret: ${MALL_WECHAT_APP_SECRET:}
        mode: ${MALL_WECHAT_MODE:open}
        auto-register: true
        mock-code: mock_wx
        mock-union-id: mock_union_001
        mock-open-id: mock_open_001
        mock-nickname: 微信测试用户
      mini-program:
        enabled: ${MALL_MINI_PROGRAM_ENABLED:false}
        mock-enabled: ${MALL_MINI_PROGRAM_MOCK:true}
        app-id: ${MALL_MINI_PROGRAM_APP_ID:}
        app-secret: ${MALL_MINI_PROGRAM_APP_SECRET:}
        auto-register: true
        mock-code: mock_mini_code
        mock-union-id: mock_mini_union_001
        mock-open-id: mock_mini_open_001
        mock-nickname: 小程序测试用户
