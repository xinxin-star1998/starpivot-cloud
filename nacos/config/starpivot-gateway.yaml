# starpivot-gateway 专属配置
# Nacos Data ID: starpivot-gateway.yaml  |  Group: DEFAULT_GROUP

spring:
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:root}

starpivot:
  gateway:
    whitelist:
      - /api/${starpivot.api.version}/auth/login
      - /api/${starpivot.api.version}/auth/refresh
      - /api/${starpivot.api.version}/auth/register
      - /api/${starpivot.api.version}/auth/logout
      - /api/${starpivot.api.version}/auth/captcha
      - /api/${starpivot.api.version}/auth/captcha/**
      - /api/${starpivot.api.version}/auth/register/enabled
      - /api/${starpivot.api.version}/auth/forgot-password
      - /api/${starpivot.api.version}/auth/forgot-password/**
      - /api/${starpivot.api.version}/portal/home/**
      - /api/${starpivot.api.version}/portal/product/**
      - /api/${starpivot.api.version}/portal/subject/**
      - /api/${starpivot.api.version}/portal/seckill/**
      - /api/${starpivot.api.version}/portal/comment/commentPageList
      - /api/${starpivot.api.version}/portal/comment/can-comment/**
      - /api/${starpivot.api.version}/portal/comment/summary/**
      - /api/${starpivot.api.version}/portal/region/**
      - /api/${starpivot.api.version}/portal/member/register
      - /api/${starpivot.api.version}/portal/member/login
      - /api/${starpivot.api.version}/portal/auth/config
      - /api/${starpivot.api.version}/portal/auth/sms/**
      - /api/${starpivot.api.version}/portal/auth/login/password
      - /api/${starpivot.api.version}/portal/auth/wechat/**
      - /api/${starpivot.api.version}/portal/image/presigned-urls
      - /local-storage/**
      - /api/${starpivot.api.version}/portal/pay/alipay/notify
      - /**/actuator/**
      - /**/doc.html
      - /**/v3/api-docs/**
      - /**/webjars/**
    rate-limit:
      enabled: true
      rules:
        - id: auth-login
          pattern: /api/${starpivot.api.version}/auth/login
          limit: 20
          window-seconds: 60
        - id: auth-captcha
          pattern: /api/${starpivot.api.version}/auth/captcha/**
          limit: 30
          window-seconds: 60
        - id: auth-forgot-password
          pattern: /api/${starpivot.api.version}/auth/forgot-password/**
          limit: 10
          window-seconds: 60
        - id: portal-sms
          pattern: /api/${starpivot.api.version}/portal/auth/sms/**
          limit: 10
          window-seconds: 60
        - id: portal-login-password
          pattern: /api/${starpivot.api.version}/portal/auth/login/password
          limit: 20
          window-seconds: 60
        - id: portal-member-login
          pattern: /api/${starpivot.api.version}/portal/member/login
          limit: 20
          window-seconds: 60
        - id: portal-member-register
          pattern: /api/${starpivot.api.version}/portal/member/register
          limit: 10
          window-seconds: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    org.springframework.cloud.gateway: INFO
