# starpivot-generator 专属配置
# Nacos Data ID: starpivot-generator.yaml  |  Group: DEFAULT_GROUP

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3307/star_pivot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:root}
      database: 0

gen:
  author: admin
  packageName: cn.org.starpivot.system
  autoRemovePre: false
  tablePrefix: sys_
  external:
    enabled: true
    session-ttl-minutes: 30
    connect-timeout-ms: 5000
    query-timeout-seconds: 30
    max-tables-per-download: 20
    allowed-hosts: []
    write-to-disk-enabled: ${GEN_EXTERNAL_WRITE_TO_DISK:false}
    default-output-root: ""
    allowed-write-paths: []
    template-dir: ""
    backup-before-write: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
