# starpivot-mall-promotion 专属配置
# Nacos Data ID: starpivot-mall-promotion.yaml  |  Group: DEFAULT_GROUP
# 业务库：star_pivot_promotion（sms_* 表）

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: ${MALL_DB_DRIVER:com.mysql.cj.jdbc.Driver}
    url: ${MALL_DB_URL:jdbc:mysql://127.0.0.1:3307/star_pivot_promotion?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MALL_DB_USERNAME:root}
    password: ${MALL_DB_PASSWORD:root}
    druid:
      initial-size: ${MALL_DB_INITIAL_SIZE:5}
      min-idle: ${MALL_DB_MIN_IDLE:5}
      max-active: ${MALL_DB_MAX_ACTIVE:20}
      max-wait: ${MALL_DB_MAX_WAIT:60000}
      validation-query: SELECT 1
      test-while-idle: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: cn.org.starpivot.mall.sms.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.slf4j.Slf4jImpl}

starpivot:
  security:
    authority-strategy: menu-permission
  mq:
    enabled: ${MQ_ENABLED:true}
  mall:
    public-base-url: ${MALL_PUBLIC_BASE_URL:http://localhost:8080}
    system-db-schema: ${SYSTEM_DB_SCHEMA:star_pivot}
    seckill:
      max-requests-per-second: ${MALL_SECKILL_MAX_RPS:10}
      unpaid-lock-minutes: ${MALL_SECKILL_UNPAID_LOCK_MINUTES:5}
