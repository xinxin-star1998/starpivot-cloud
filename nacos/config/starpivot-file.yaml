# starpivot-file 专属配置
# Nacos Data ID: starpivot-file.yaml  |  Group: DEFAULT_GROUP

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3307/star_pivot?characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:root}
      connect-timeout: 10s
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 2
      logic-not-delete-value: 0

starpivot:
  security:
    authority-strategy: menu-permission

management:
  endpoints:
    web:
      exposure:
        include: health,info

file-center:
  upload:
    max-size-by-media-type:
      IMAGE: 10485760
      VIDEO: 209715200
      DOCUMENT: 52428800
      AUDIO: 52428800
      OTHER: 52428800
  purge:
    enabled: true
    recycle-retention-days: 90
    batch-size: 100
    cron: "0 0 3 * * ?"
  category-access:
    enabled: true
    restricted-categories:
      - HR
      - FINANCE
      - CONTRACT
      - CERT
    all-categories-permission: file:category:all
