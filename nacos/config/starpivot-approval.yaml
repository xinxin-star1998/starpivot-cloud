# starpivot-approval 专属配置
# Nacos Data ID: starpivot-approval.yaml  |  Group: DEFAULT_GROUP
# 业务库：star_pivot_approval（ap_* 表）；RBAC 菜单仍在 star_pivot

spring:
  datasource:
    url: ${APPROVAL_DB_URL:jdbc:mysql://127.0.0.1:3307/star_pivot_approval?characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 2
      logic-not-delete-value: 0

starpivot:
  security:
    authority-strategy: menu-permission
  mq:
    enabled: ${MQ_ENABLED:true}
  approval:
    system-db-schema: ${SYSTEM_DB_SCHEMA:star_pivot}
    timeout-scan-ms: 60000
    timeout-batch-size: 50
    local-message:
      enabled: true
      flush-ms: 60000

logging:
  level:
    cn.org.starpivot.approval: INFO
