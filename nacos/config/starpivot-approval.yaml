# starpivot-approval 专属配置
# Nacos Data ID: starpivot-approval.yaml  |  Group: DEFAULT_GROUP

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3307/star_pivot?characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 2
      logic-not-delete-value: 0

starpivot:
  security:
    authority-strategy: menu-permission
  approval:
    timeout-scan-ms: 60000
    timeout-batch-size: 50

logging:
  level:
    cn.org.starpivot.approval: DEBUG
