# starpivot-mall-ware 专属配置
# Nacos Data ID: starpivot-mall-ware.yaml  |  Group: DEFAULT_GROUP
# 业务库：star_pivot_ware（wms_*、address 表）

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: ${MALL_DB_DRIVER:com.mysql.cj.jdbc.Driver}
    url: ${MALL_DB_URL:jdbc:mysql://127.0.0.1:3307/star_pivot_ware?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MALL_DB_USERNAME:root}
    password: ${MALL_DB_PASSWORD:root}
    druid:
      initial-size: ${MALL_DB_INITIAL_SIZE:5}
      min-idle: ${MALL_DB_MIN_IDLE:5}
      max-active: ${MALL_DB_MAX_ACTIVE:20}
      max-wait: ${MALL_DB_MAX_WAIT:60000}
      validation-query: SELECT 1
      test-while-idle: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/wms/**/*.xml
  type-aliases-package: cn.org.starpivot.mall.wms.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.slf4j.Slf4jImpl}

starpivot:
  security:
    authority-strategy: menu-permission
  mq:
    enabled: ${MQ_ENABLED:true}
  mall:
    system-db-schema: ${SYSTEM_DB_SCHEMA:star_pivot}
