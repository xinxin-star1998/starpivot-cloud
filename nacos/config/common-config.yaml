# StarPivot 公共配置
# Nacos Data ID: common-config.yaml  |  Group: DEFAULT_GROUP
# 敏感项通过环境变量注入，勿在此填写真实密钥

spring:
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:root}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:6000ms}

starpivot:
  api:
    version: ${API_VERSION:v1}
  jwt:
    secret: ${JWT_SECRET:dev-local-jwt-secret-must-be-at-least-32-chars}
    expire: ${JWT_EXPIRE:7200000}
    refresh-expire: ${JWT_REFRESH_EXPIRE:604800000}
  internal:
    token: ${INTERNAL_SERVICE_TOKEN:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    enabled: ${TRACING_ENABLED:true}
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://127.0.0.1:9411/api/v2/spans}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    cn.org.starpivot: ${LOG_LEVEL_STARPIVOT:DEBUG}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{50} - %msg%n"
