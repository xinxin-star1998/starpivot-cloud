# StarPivot 公共配置
# Nacos Data ID: common-config.yaml  |  Group: DEFAULT_GROUP
# 敏感项通过环境变量注入，勿在此填写真实密钥

spring:
  output:
    ansi:
      enabled: ${LOG_ANSI_ENABLED:always}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:root}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:6000ms}
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: ${FEIGN_CONNECT_TIMEOUT:3000}
            readTimeout: ${FEIGN_READ_TIMEOUT:10000}
      httpclient:
        hc5:
          enabled: true

starpivot:
  api:
    version: ${API_VERSION:v1}
  mq:
    enabled: ${MQ_ENABLED:false}
  jwt:
    secret: ${JWT_SECRET:dev-local-jwt-secret-must-be-at-least-32-chars}
    expire: ${JWT_EXPIRE:7200000}
    refresh-expire: ${JWT_REFRESH_EXPIRE:604800000}
  internal:
    token: ${INTERNAL_SERVICE_TOKEN:}
    require-token: ${INTERNAL_SERVICE_TOKEN_REQUIRED:false}
  scheduling:
    pool-size: ${SCHEDULING_POOL_SIZE:4}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    enabled: ${TRACING_ENABLED:true}
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://127.0.0.1:9411/api/v2/spans}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    cn.org.starpivot: ${LOG_LEVEL_STARPIVOT:INFO}
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr([%thread]){magenta} %clr([%X{traceId}]){blue} %clr(%-5level){highlight} %clr(%logger{50}){cyan} %clr(-){faint} %msg%n"
