# 阿里云 OSS 公共配置（按需 import）
# Nacos Data ID: oss-config.yaml  |  Group: DEFAULT_GROUP
# 敏感项通过环境变量注入，勿在此填写真实密钥

oss:
  enabled: ${OSS_ENABLED:true}
  endpoint: ${OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
  access-key-id: ${OSS_ACCESS_KEY_ID:}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
  bucket-name: ${OSS_BUCKET_NAME:star-pivot}
  url-prefix: ${OSS_URL_PREFIX:}
