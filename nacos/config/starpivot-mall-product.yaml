# starpivot-mall-product 专属配置
# Nacos Data ID: starpivot-mall-product.yaml  |  Group: DEFAULT_GROUP

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: ${MALL_DB_DRIVER:com.mysql.cj.jdbc.Driver}
    url: ${MALL_DB_URL:jdbc:mysql://127.0.0.1:3307/star_pivot_mall?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MALL_DB_USERNAME:root}
    password: ${MALL_DB_PASSWORD:root}
    druid:
      initial-size: ${MALL_DB_INITIAL_SIZE:5}
      min-idle: ${MALL_DB_MIN_IDLE:5}
      max-active: ${MALL_DB_MAX_ACTIVE:20}
      max-wait: ${MALL_DB_MAX_WAIT:60000}
      validation-query: SELECT 1
      test-while-idle: true

starpivot:
  mall:
    system-db-schema: ${SYSTEM_DB_SCHEMA:star_pivot}
    elasticsearch:
      enabled: ${MALL_ES_ENABLED:false}
      uris: ${MALL_ES_URIS:http://127.0.0.1:9200}
      index-name: ${MALL_ES_INDEX:mall_product}
      reindex-on-startup: ${MALL_ES_REINDEX_ON_STARTUP:false}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: cn.org.starpivot.mall.pms.domain,cn.org.starpivot.mall.pms.entity,cn.org.starpivot.mall.oms.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.slf4j.Slf4jImpl}

# 商品图存储（与 system、file 服务共用 OSS 桶）
oss:
  enabled: ${OSS_ENABLED:true}
  endpoint: ${OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
  access-key-id: ${OSS_ACCESS_KEY_ID:}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
  url-prefix: ${OSS_URL_PREFIX:}
  bucket-name: ${OSS_BUCKET_NAME:star-pivot}
