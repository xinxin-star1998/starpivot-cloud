# starpivot-mall-order 专属配置
# Nacos Data ID: starpivot-mall-order.yaml  |  Group: DEFAULT_GROUP
# 业务库：star_pivot_order（oms_*、mq_message 表）

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: ${MALL_DB_DRIVER:com.mysql.cj.jdbc.Driver}
    url: ${MALL_DB_URL:jdbc:mysql://127.0.0.1:3307/star_pivot_order?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MALL_DB_USERNAME:root}
    password: ${MALL_DB_PASSWORD:root}
    druid:
      initial-size: ${MALL_DB_INITIAL_SIZE:5}
      min-idle: ${MALL_DB_MIN_IDLE:5}
      max-active: ${MALL_DB_MAX_ACTIVE:20}
      max-wait: ${MALL_DB_MAX_WAIT:60000}
      validation-query: SELECT 1
      test-while-idle: true

starpivot:
  security:
    authority-strategy: menu-permission
  mq:
    enabled: ${MQ_ENABLED:true}
  mall:
    public-base-url: ${MALL_PUBLIC_BASE_URL:http://localhost:8080}
    system-db-schema: ${SYSTEM_DB_SCHEMA:star_pivot}
    mock-pay-enabled: ${MALL_MOCK_PAY_ENABLED:false}
    order-paid-outbox-enabled: ${MALL_ORDER_PAID_OUTBOX_ENABLED:false}
    order-paid-followup-outbox-enabled: ${MALL_ORDER_PAID_FOLLOWUP_OUTBOX_ENABLED:false}
    order-close-delay-mq-enabled: ${MALL_ORDER_CLOSE_DELAY_MQ_ENABLED:false}
    order-lifecycle-scan-ms: ${MALL_ORDER_LIFECYCLE_SCAN_MS:300000}
    refund-sync-scan-ms: ${MALL_REFUND_SYNC_SCAN_MS:300000}
    local-message:
      enabled: ${MALL_LOCAL_MESSAGE_ENABLED:true}
      flush-ms: ${MALL_LOCAL_MESSAGE_FLUSH_MS:60000}
    order:
      default-freight: ${MALL_ORDER_DEFAULT_FREIGHT:10.00}
      integration-yuan-rate: ${MALL_INTEGRATION_YUAN_RATE:0.01}
      integration-max-rate: ${MALL_INTEGRATION_MAX_RATE:0.50}
    seckill:
      max-requests-per-second: ${MALL_SECKILL_MAX_RPS:10}
      unpaid-lock-minutes: ${MALL_SECKILL_UNPAID_LOCK_MINUTES:5}
    alipay:
      enabled: ${MALL_ALIPAY_ENABLED:false}
      app-id: ${MALL_ALIPAY_APP_ID:}
      private-key: ${MALL_ALIPAY_PRIVATE_KEY:}
      alipay-public-key: ${MALL_ALIPAY_PUBLIC_KEY:}
      gateway-url: ${MALL_ALIPAY_GATEWAY_URL:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
      notify-url: ${MALL_ALIPAY_NOTIFY_URL:}
      return-url: ${MALL_ALIPAY_RETURN_URL:}
    wxpay:
      enabled: ${MALL_WXPAY_ENABLED:false}
      mock-enabled: ${MALL_WXPAY_MOCK:true}
      app-id: ${MALL_WXPAY_APP_ID:}
      mch-id: ${MALL_WXPAY_MCH_ID:}
      api-v3-key: ${MALL_WXPAY_API_V3_KEY:}
      merchant-serial-number: ${MALL_WXPAY_MERCHANT_SERIAL:}
      private-key: ${MALL_WXPAY_PRIVATE_KEY:}
      notify-url: ${MALL_WXPAY_NOTIFY_URL:}
      refund-notify-url: ${MALL_WXPAY_REFUND_NOTIFY_URL:}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: cn.org.starpivot.mall.oms.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.slf4j.Slf4jImpl}
