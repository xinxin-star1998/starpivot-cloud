server:
  port: ${SERVER_PORT:9205}
  servlet:
    context-path: /api/${starpivot.api.version}

spring:
  application:
    name: starpivot-mall
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import:
      - optional:classpath:application-nacos.yml
      - optional:nacos:common-config.yaml?group=${NACOS_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:mq-config.yaml?group=${NACOS_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:${spring.application.name}.yaml?group=${NACOS_GROUP:DEFAULT_GROUP}&refreshEnabled=true
  datasource:
    url: ${MALL_DB_URL:jdbc:mysql://127.0.0.1:3307/star_pivot_mall?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MALL_DB_USERNAME:root}
    password: ${MALL_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: cn.org.starpivot.mall.pms.domain,cn.org.starpivot.mall.pms.entity,cn.org.starpivot.mall.oms.entity,cn.org.starpivot.mall.sms.entity,cn.org.starpivot.mall.ums.entity,cn.org.starpivot.mall.wms.entity,cn.org.starpivot.mall.portal.auth.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.slf4j.Slf4jImpl}

starpivot:
  api:
    version: ${API_VERSION:v1}
  mall:
    # RBAC 库名，须与 system 服务 datasource 一致
    system-db-schema: ${SYSTEM_DB_SCHEMA:star_pivot}
    # 开发联调 Mock 支付，生产请设 MALL_MOCK_PAY_ENABLED=false
    mock-pay-enabled: ${MALL_MOCK_PAY_ENABLED:true}
    stock-lock-scan-ms: ${MALL_STOCK_LOCK_SCAN_MS:60000}
    order-lifecycle-scan-ms: ${MALL_ORDER_LIFECYCLE_SCAN_MS:300000}
    portal-auth:
      sms:
        mock-enabled: ${MALL_PORTAL_SMS_MOCK:false}
        mock-code: ${MALL_PORTAL_SMS_MOCK_CODE:123456}
        code-ttl-seconds: 300
        send-interval-seconds: 60
        daily-limit-per-mobile: 10
        daily-limit-per-ip: 50
        aliyun:
          enabled: ${MALL_PORTAL_SMS_ALIYUN_ENABLED:true}
          access-key-id: ${MALL_PORTAL_SMS_ALIYUN_ACCESS_KEY_ID:${OSS_ACCESS_KEY_ID:}}
          access-key-secret: ${MALL_PORTAL_SMS_ALIYUN_ACCESS_KEY_SECRET:${OSS_ACCESS_KEY_SECRET:}}
          sign-name: ${MALL_PORTAL_SMS_ALIYUN_SIGN_NAME:速通互联验证码}
          template-code: ${MALL_PORTAL_SMS_ALIYUN_TEMPLATE_CODE:100001}
          scheme-name: ${MALL_PORTAL_SMS_ALIYUN_SCHEME_NAME:}
          verify-mode: ${MALL_PORTAL_SMS_ALIYUN_VERIFY_MODE:redis}
      password:
        max-fail-count: 5
        lock-minutes: 30
      wechat:
        enabled: ${MALL_WECHAT_ENABLED:false}
        mock-enabled: ${MALL_WECHAT_MOCK:true}
        redirect-uri: ${MALL_WECHAT_REDIRECT_URI:http://localhost:3000/portal/login/wechat/callback}
        app-id: ${MALL_WECHAT_APP_ID:}
        app-secret: ${MALL_WECHAT_APP_SECRET:}
        mode: ${MALL_WECHAT_MODE:open}
        auto-register: true
        mock-code: mock_wx
        mock-union-id: mock_union_001
        mock-open-id: mock_open_001
        mock-nickname: 微信测试用户
      mini-program:
        enabled: ${MALL_MINI_PROGRAM_ENABLED:false}
        mock-enabled: ${MALL_MINI_PROGRAM_MOCK:true}
        app-id: ${MALL_MINI_PROGRAM_APP_ID:}
        app-secret: ${MALL_MINI_PROGRAM_APP_SECRET:}
        auto-register: true
        mock-code: mock_mini_code
        mock-union-id: mock_mini_union_001
        mock-open-id: mock_mini_open_001
        mock-nickname: 小程序测试用户
    alipay:
      enabled: ${MALL_ALIPAY_ENABLED:false}
      app-id: ${MALL_ALIPAY_APP_ID:}
      private-key: ${MALL_ALIPAY_PRIVATE_KEY:}
      alipay-public-key: ${MALL_ALIPAY_PUBLIC_KEY:}
      gateway-url: ${MALL_ALIPAY_GATEWAY_URL:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
      notify-url: ${MALL_ALIPAY_NOTIFY_URL:http://127.0.0.1:8080/api/v1/portal/pay/alipay/notify}
      return-url: ${MALL_ALIPAY_RETURN_URL:http://127.0.0.1:5173/portal/orders}
  security:
    authority-strategy: menu-permission
