server:
  port: ${SERVER_PORT:9205}
  servlet:
    context-path: /api/${starpivot.api.version}

spring:
  application:
    name: starpivot-mall
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import:
      - optional:classpath:application-nacos.yml
      - optional:nacos:common-config.yaml?group=${NACOS_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:${spring.application.name}.yaml?group=${NACOS_GROUP:DEFAULT_GROUP}&refreshEnabled=true
  datasource:
    url: ${MALL_DB_URL:jdbc:mysql://127.0.0.1:3307/star_pivot_mall?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MALL_DB_USERNAME:root}
    password: ${MALL_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: cn.org.starpivot.mall.pms.domain,cn.org.starpivot.mall.pms.entity,cn.org.starpivot.mall.oms.entity,cn.org.starpivot.mall.sms.entity,cn.org.starpivot.mall.ums.entity,cn.org.starpivot.mall.wms.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.slf4j.Slf4jImpl}

starpivot:
  api:
    version: ${API_VERSION:v1}
  mall:
    # RBAC 库名，须与 system 服务 datasource 一致
    system-db-schema: ${SYSTEM_DB_SCHEMA:star_pivot}
    # 开发联调 Mock 支付，生产请设 MALL_MOCK_PAY_ENABLED=false
    mock-pay-enabled: ${MALL_MOCK_PAY_ENABLED:true}
    stock-lock-scan-ms: ${MALL_STOCK_LOCK_SCAN_MS:60000}
  security:
    authority-strategy: menu-permission
