server:
  port: 9203

spring:
  application:
    name: starpivot-generator
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:star_pivot}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: 0

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 2
      logic-not-delete-value: 0

starpivot:
  jwt:
    secret: ${JWT_SECRET:Dj4G8272xJONkOqkn1pM8q1n+U5MPLrRUCjXun3/Yeo=}
    expire: ${JWT_EXPIRE:7200000}

gen:
  author: admin
  packageName: cn.org.starpivot.system
  autoRemovePre: false
  tablePrefix: sys_
  external:
    enabled: true
    session-ttl-minutes: 30
    connect-timeout-ms: 5000
    query-timeout-seconds: 30
    max-tables-per-download: 20
    allowed-hosts: []
    write-to-disk-enabled: true
    default-output-root: ""
    allowed-write-paths: []
    template-dir: ""
    backup-before-write: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    cn.org.starpivot: debug
