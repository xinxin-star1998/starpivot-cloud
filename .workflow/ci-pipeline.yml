# Gitee Go 持续集成流水线（与 GitHub Actions 对齐）
# 开通：仓库 → 流水线 / Gitee Go → 免费开通
# 文档：https://help.gitee.com/gitee-go/

version: '1.0'
name: ci-pipeline
displayName: 星枢云持续集成

triggers:
  push:
    branches:
      precise:
        - main
        - master
      include:
        - '^release.*'
  pr:
    branches:
      precise:
        - main
        - master

variables:
  MAVEN_OPTS: '-B'
  SONAR_PROJECT_KEY: 'starpivot-cloud'

stages:
  - stage:
    name: backend
    displayName: 后端构建
    strategy: fast
    trigger: auto
    steps:
      - step: build@maven
        name: maven_build
        displayName: Maven编译测试
        jdkVersion: 17
        mavenVersion: 3.6.3
        commands:
          - mvn ${MAVEN_OPTS} clean package -DskipTests
          - mvn ${MAVEN_OPTS} test

  - stage:
    name: frontend_ui
    displayName: 管理端前端
    strategy: fast
    trigger: auto
    steps:
      - step: build@nodejs
        name: build_ui
        displayName: 管理端前端构建
        nodeVersion: 20
        commands:
          - npm config set registry https://registry.npmmirror.com
          - npm install -g pnpm@9
          - cd star-pivot-ui && export CI=true HUSKY=0 && pnpm install --frozen-lockfile && pnpm run build
        artifacts:
          - name: UI_ARTIFACT
            path:
              - star-pivot-ui/dist

  - stage:
    name: frontend_mp
    displayName: 小程序前端
    strategy: fast
    trigger: auto
    steps:
      - step: build@nodejs
        name: build_mp
        displayName: 小程序H5构建
        nodeVersion: 20
        commands:
          - npm config set registry https://registry.npmmirror.com
          - cd star-pivot-mp && npm ci && npm run build:h5
        artifacts:
          - name: MP_ARTIFACT
            path:
              - star-pivot-mp/dist/build/h5

  - stage:
    name: quality
    displayName: 代码质量扫描
    strategy: naturally
    trigger: manual
    steps:
      - step: build@maven
        name: sonar_scan
        displayName: SonarQube扫描
        jdkVersion: 17
        mavenVersion: 3.6.3
        commands:
          - >
            mvn ${MAVEN_OPTS} verify sonar:sonar
            -Dsonar.projectKey=${SONAR_PROJECT_KEY}
            -Dsonar.host.url=${SONAR_HOST_URL}
            -Dsonar.login=${SONAR_TOKEN}
