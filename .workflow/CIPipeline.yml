# Gitee Go 持续集成流水线
# 开通：仓库 → 流水线 / Gitee Go → 免费开通
# 文档：https://help.gitee.com/gitee-go/

version: '1.0'
name: ci-pipeline
displayName: StarPivot CI

triggers:
  push:
    branches:
      precise:
        - main
        - master
      include:
        - '^release.*'
  pr:
    branches:
      precise:
        - main
        - master

variables:
  MAVEN_OPTS: '-B'
  SONAR_PROJECT_KEY: 'starpivot-cloud'

stages:
  - stage: backend
    displayName: 后端构建
    strategy: fast
    trigger: auto
    steps:
      - step: build@maven
        name: maven_build
        displayName: Maven 编译打包
        jdkVersion: 17
        mavenVersion: 3.6.3
        commands:
          - mvn ${MAVEN_OPTS} clean package -DskipTests
          - mvn ${MAVEN_OPTS} test
        artifacts:
          - name: BACKEND_ARTIFACT
            path:
              - '**/target/*.jar'

  - stage: frontend-ui
    displayName: 管理端前端
    strategy: fast
    trigger: auto
    steps:
      - step: build@nodejs
        name: build_ui
        displayName: star-pivot-ui 构建
        nodeVersion: 20.19.0
        commands:
          - npm install -g pnpm@9
          - cd star-pivot-ui && HUSKY=0 pnpm install --frozen-lockfile
          - cd star-pivot-ui && pnpm run build
        artifacts:
          - name: UI_ARTIFACT
            path:
              - star-pivot-ui/dist

  - stage: frontend-mp
    displayName: 小程序前端
    strategy: naturally
    trigger: auto
    steps:
      - step: build@nodejs
        name: build_mp
        displayName: star-pivot-mp H5 构建
        nodeVersion: 20.19.0
        commands:
          - cd star-pivot-mp && npm ci
          - cd star-pivot-mp && npm run build:h5

  - stage: quality
    displayName: 代码质量（可选）
    strategy: naturally
    trigger: manual
    steps:
      - step: build@maven
        name: sonar_scan
        displayName: SonarQube 扫描
        jdkVersion: 17
        mavenVersion: 3.6.3
        commands:
          - >
            mvn ${MAVEN_OPTS} verify sonar:sonar
            -Dsonar.projectKey=${SONAR_PROJECT_KEY}
            -Dsonar.host.url=${SONAR_HOST_URL}
            -Dsonar.login=${SONAR_TOKEN}
