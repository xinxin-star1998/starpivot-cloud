name: CI

on:
  push:
    branches: [main, master, 'release/**']
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Maven)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven compile & package
        run: mvn -B clean package -DskipTests

      - name: Maven test
        run: mvn -B test

      - name: SonarQube Scan
        if: vars.SONAR_ENABLED == 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: >
          mvn -B verify sonar:sonar
          -Dsonar.projectKey=starpivot-cloud
          -Dsonar.host.url=${SONAR_HOST_URL}
          -Dsonar.login=${SONAR_TOKEN}

  frontend-ui:
    name: Frontend (star-pivot-ui)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: star-pivot-ui
    env:
      HUSKY: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: star-pivot-ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

  frontend-mp:
    name: Frontend (star-pivot-mp)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: star-pivot-mp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: star-pivot-mp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build H5
        run: npm run build:h5
