services:
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: starpivot-nacos
    environment:
      MODE: standalone
      JVM_XMS: 256m
      JVM_XMX: 256m
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-data:/home/nacos/data
      - nacos-logs:/home/nacos/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8848/nacos/v1/console/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    networks:
      starpivot-net:
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: starpivot-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: star_pivot
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    # 命名卷替代本地E盘目录绑定
    # 首次导入核心库 + 审批库；商城五域 SQL 请手动导入，见 docs/docker-deploy.md 与 sql/import_mall_databases.ps1
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/00_create_mall_database.sql:/docker-entrypoint-initdb.d/00_create_mall_database.sql:ro
      - ./sql/star_pivot.sql:/docker-entrypoint-initdb.d/01_star_pivot.sql:ro
      - ./sql/sys_menu.sql:/docker-entrypoint-initdb.d/02_sys_menu.sql:ro
      - ./sql/star_pivot_approval.sql:/docker-entrypoint-initdb.d/03_star_pivot_approval.sql:ro
      - ./sql/star_pivot_tms.sql:/docker-entrypoint-initdb.d/04_star_pivot_tms.sql:ro
      - ./sql/patch_tms_menu.sql:/docker-entrypoint-initdb.d/05_patch_tms_menu.sql:ro
      - ./sql/patch_tms_phase3.sql:/docker-entrypoint-initdb.d/06_patch_tms_phase3.sql:ro
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time_zone='+8:00'
      --sql-mode=STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 300s
    networks:
      starpivot-net:
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: starpivot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --requirepass root --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "root", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      starpivot-net:
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: starpivot-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    networks:
      starpivot-net:
    restart: unless-stopped

  zipkin:
    image: openzipkin/zipkin:3.4
    container_name: starpivot-zipkin
    ports:
      - "9411:9411"
    networks:
      starpivot-net:
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: starpivot-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      starpivot-net:
    restart: unless-stopped

# 声明全部命名卷（关键新增区块）
volumes:
  mysql-data:
  redis-data:
  nacos-data:
  nacos-logs:
  rabbitmq-data:
  es-data:

networks:
  starpivot-net:
    driver: bridge