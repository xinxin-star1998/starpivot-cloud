server:
  port: 8080

spring:
  application:
    name: starpivot-gateway
  config:
    import:
      - optional:classpath:application-nacos.yml
      - optional:nacos:common-config.yaml?group=${NACOS_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:${spring.application.name}.yaml?group=${NACOS_GROUP:DEFAULT_GROUP}&refreshEnabled=true
  cloud:
    gateway:
      routes:
        # 认证服务：前端统一走 /api/v1/auth/*，网关改写为 Controller 实际路径
        - id: starpivot-auth
          uri: lb://starpivot-auth
          predicates:
            - Path=/api/${starpivot.api.version}/auth/**
          filters:
            - RewritePath=/api/(?<version>v\d+)/auth/(?<segment>.*), /api/$\{version}/$\{segment}
        # 系统服务
        - id: starpivot-system
          uri: lb://starpivot-system
          predicates:
            - Path=/api/${starpivot.api.version}/sys/**,/api/${starpivot.api.version}/router/**,/api/${starpivot.api.version}/avatar/**,/api/${starpivot.api.version}/notice/**,/api/${starpivot.api.version}/message/**,/api/${starpivot.api.version}/config/**,/api/${starpivot.api.version}/dashboard/**,/api/${starpivot.api.version}/health
        # 文件服务（通用上传）
        - id: starpivot-file
          uri: lb://starpivot-file
          predicates:
            - Path=/api/${starpivot.api.version}/common/upload/**
        # 文件中心
        - id: starpivot-file-manage
          uri: lb://starpivot-file
          predicates:
            - Path=/api/${starpivot.api.version}/file/**
        # 代码生成
        - id: starpivot-generator
          uri: lb://starpivot-generator
          predicates:
            - Path=/api/${starpivot.api.version}/tool/gen/**
        # 监控
        - id: starpivot-monitor
          uri: lb://starpivot-monitor
          predicates:
            - Path=/api/${starpivot.api.version}/monitor/**
        # 商城会员服务（C 端会员 / 认证 / 地址 / 收藏 + B 端会员管理）
        - id: starpivot-mall-member
          uri: lb://starpivot-mall-member
          predicates:
            - Path=/api/${starpivot.api.version}/portal/member/**,/api/${starpivot.api.version}/portal/auth/**,/api/${starpivot.api.version}/portal/address/**,/api/${starpivot.api.version}/portal/collect/**,/api/${starpivot.api.version}/mall/member/**,/api/${starpivot.api.version}/mall/member-level/**,/api/${starpivot.api.version}/mall/member-growth/**,/api/${starpivot.api.version}/mall/member-statistics/**,/api/${starpivot.api.version}/mall/member-collect/**,/api/${starpivot.api.version}/mall/member-login-log/**,/api/${starpivot.api.version}/mall/member-receive-address/**
        # 商城商品服务（PMS + ES + C 端商品/评价/图片）
        - id: starpivot-mall-product
          uri: lb://starpivot-mall-product
          predicates:
            - Path=/api/${starpivot.api.version}/portal/product/**,/api/${starpivot.api.version}/portal/image/**,/api/${starpivot.api.version}/portal/comment/**,/api/${starpivot.api.version}/mall/product/**,/api/${starpivot.api.version}/mall/sku/**,/api/${starpivot.api.version}/mall/brand/**,/api/${starpivot.api.version}/mall/category/**,/api/${starpivot.api.version}/mall/attr/**,/api/${starpivot.api.version}/mall/group/**,/api/${starpivot.api.version}/mall/comment/**,/api/${starpivot.api.version}/mall/product-search/**,/api/${starpivot.api.version}/mall/goods/**
        # 商城仓储服务（WMS + 采购 + B 端地址 + C 端省市区）
        - id: starpivot-mall-ware
          uri: lb://starpivot-mall-ware
          predicates:
            - Path=/api/${starpivot.api.version}/mall/wareinfo/**,/api/${starpivot.api.version}/mall/ware-sku/**,/api/${starpivot.api.version}/mall/ware-task/**,/api/${starpivot.api.version}/mall/purchase/**,/api/${starpivot.api.version}/mall/address/**,/api/${starpivot.api.version}/portal/region/**
        # 商城订单服务（OMS + 支付 + C 端购物车/订单）
        - id: starpivot-mall-order
          uri: lb://starpivot-mall-order
          predicates:
            - Path=/api/${starpivot.api.version}/portal/order/**,/api/${starpivot.api.version}/portal/cart/**,/api/${starpivot.api.version}/portal/pay/**,/api/${starpivot.api.version}/mall/order/**,/api/${starpivot.api.version}/mall/order-return/**,/api/${starpivot.api.version}/mall/order-setting/**,/api/${starpivot.api.version}/mall/payment/**,/api/${starpivot.api.version}/mall/refund/**
        # 商城营销服务（SMS + C 端首页/优惠券/秒杀/专题）
        - id: starpivot-mall-promotion
          uri: lb://starpivot-mall-promotion
          predicates:
            - Path=/api/${starpivot.api.version}/portal/home/**,/api/${starpivot.api.version}/portal/coupon/**,/api/${starpivot.api.version}/portal/seckill/**,/api/${starpivot.api.version}/portal/subject/**,/api/${starpivot.api.version}/mall/coupon/**,/api/${starpivot.api.version}/mall/coupon-history/**,/api/${starpivot.api.version}/mall/home-adv/**,/api/${starpivot.api.version}/mall/category-hot/**,/api/${starpivot.api.version}/mall/subject/**,/api/${starpivot.api.version}/mall/member-price/**,/api/${starpivot.api.version}/mall/sku-ladder/**,/api/${starpivot.api.version}/mall/sku-full-reduction/**,/api/${starpivot.api.version}/mall/spu-bounds/**,/api/${starpivot.api.version}/mall/seckill-session/**,/api/${starpivot.api.version}/mall/seckill-promotion/**
        # 审批中台
        - id: starpivot-approval
          uri: lb://starpivot-approval
          predicates:
            - Path=/api/${starpivot.api.version}/approval/**
