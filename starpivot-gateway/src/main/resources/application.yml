server:
  port: 8080

spring:
  application:
    name: starpivot-gateway
  config:
    import:
      - optional:nacos:common-config.yaml?group=${NACOS_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:${spring.application.name}.yaml?group=${NACOS_GROUP:DEFAULT_GROUP}&refreshEnabled=true
  cloud:
    nacos:
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml
        refresh-enabled: true
        import-check:
          enabled: false
    gateway:
      routes:
        # 认证服务（前端 /auth/* 路径会改写为 Controller 实际路径）
        - id: starpivot-auth
          uri: lb://starpivot-auth
          predicates:
            - Path=/api/${starpivot.api.version}/auth/**,/api/${starpivot.api.version}/login,/api/${starpivot.api.version}/refresh,/api/${starpivot.api.version}/register,/api/${starpivot.api.version}/logout,/api/${starpivot.api.version}/user/**,/api/${starpivot.api.version}/captcha,/api/${starpivot.api.version}/captcha/**,/api/${starpivot.api.version}/register/**
          filters:
            - RewritePath=/api/(?<version>v\d+)/auth/(?<segment>.*), /api/$\{version}/$\{segment}
        # 系统服务
        - id: starpivot-system
          uri: lb://starpivot-system
          predicates:
            - Path=/api/${starpivot.api.version}/sys/**,/api/${starpivot.api.version}/router/**,/api/${starpivot.api.version}/avatar/**,/api/${starpivot.api.version}/notice/**,/api/${starpivot.api.version}/config/**,/api/${starpivot.api.version}/dashboard/**,/api/${starpivot.api.version}/health
        # 文件服务
        - id: starpivot-file
          uri: lb://starpivot-file
          predicates:
            - Path=/api/${starpivot.api.version}/common/upload/**
        # 代码生成
        - id: starpivot-generator
          uri: lb://starpivot-generator
          predicates:
            - Path=/api/${starpivot.api.version}/tool/gen/**
        # 监控
        - id: starpivot-monitor
          uri: lb://starpivot-monitor
          predicates:
            - Path=/api/${starpivot.api.version}/monitor/**
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}

starpivot:
  api:
    version: ${API_VERSION:v1}
  jwt:
    secret: ${JWT_SECRET:dev-local-jwt-secret-must-be-at-least-32-chars}
    expire: ${JWT_EXPIRE:7200000}
  gateway:
    whitelist:
      - /api/${starpivot.api.version}/login
      - /api/${starpivot.api.version}/refresh
      - /api/${starpivot.api.version}/register
      - /api/${starpivot.api.version}/logout
      - /api/${starpivot.api.version}/captcha
      - /api/${starpivot.api.version}/captcha/**
      - /api/${starpivot.api.version}/register/enabled
      - /api/${starpivot.api.version}/auth/login
      - /api/${starpivot.api.version}/auth/refresh
      - /api/${starpivot.api.version}/auth/register
      - /api/${starpivot.api.version}/auth/logout
      - /api/${starpivot.api.version}/auth/captcha
      - /api/${starpivot.api.version}/auth/captcha/**
      - /api/${starpivot.api.version}/auth/register/enabled
      - /api/${starpivot.api.version}/router/dynamic-routes
      - /**/actuator/**
      - /**/doc.html
      - /**/swagger-ui/**
      - /**/v3/api-docs/**
      - /**/webjars/**

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.cloud.gateway: INFO