<!doctype html>
<html>
  <head>
    <title>Star Pivot UI</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Star Pivot UI - A modern admin dashboard template built with Vue 3, TypeScript, and Element Plus."
    />
    <link
      rel="shortcut icon"
      type="image/x-icon"
      href="src/assets/images/svg/star-pivot-logo.svg"
    />

    <style>
      /* 防止页面刷新时白屏的初始样式 */
      html {
        background-color: #fafbfc;
      }

      html.dark {
        background-color: #070707;
      }
    </style>

    <script>
      // 初始化 html class 主题属性
      ;(function () {
        try {
          if (typeof Storage === 'undefined' || !window.localStorage) {
            return
          }

          const themeType = localStorage.getItem('sys-theme')
          if (themeType === 'dark') {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {
          console.warn('Failed to apply initial theme:', e)
        }
      })()
    </script>
  </head>

  <body>
    <div id="app"></div>
    <!-- 运行时配置，部署后改 config.js 中的 VITE_API_URL 即可生效，无需重新打包 -->
    <script src="/config.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
